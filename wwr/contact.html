<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rafting Travel</title>
    <meta name="description"
      content="Contact Rafting Travel for reservations, questions, or feedback. Get in touch with our team today!">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <img src="images/logo.png" alt="Rafting Logo" class="logo">

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>


    <main>
        <h1>Contact Us</h1>

        <!-- Company Info -->
        <section class="contact-info">
            <h2>Rarting Travel Company</h2>
            <p>📍 road 29 fallen hills, Australia</p>
            <p>📞 +234 706 550 4698</p>
            <p>📧 info@raftingtravel.com</p>

            <!-- Google Map -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18..." width="300" height="200"
              allowfullscreen="" loading="lazy">
            </iframe>
        </section>

        <!-- Employees -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Manager">
                <figcaption>Peter Ezeigwe – Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Guide">
                <figcaption>Kelvin Johnson – Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Support">
                <figcaption>Alexa Bliss– Customer Support</figcaption>
            </figure>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>
                <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                <label><input type="radio" name="purpose" value="reservation"> Reservation
                    Question</label>
                <label><input type="radio" name="purpose" value="suggestion"> Website
                    Suggestion</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <label>
                    <input type="checkbox" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 💦 Rafting Travel 💦 CELESTIAL KING</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
