<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="CELESTIAL KING">
    <title>Contact Us | Rafting Travel</title>
    <meta name="description"
      content="Contact Rafting Travel for reservations, questions, or feedback. Get in touch with our team today!">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <img src="images/logo.png" alt="Rafting Logo" class="logo">

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>


    <main>
        <h1>Contact Us</h1>

        <!-- Company Info -->
        <section class="contact-info">
            <h2>Rarting Travel Company</h2>
            <p>📍 road 29 fallen hills, Australia</p>
            <p>📞 +234 706 550 4698</p>
            <p>📧 info@raftingtravel.com</p>

            <!-- Google Map -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18..." width="300" height="200"
              allowfullscreen="" loading="lazy">
            </iframe>
        </section>

        <!-- Employees -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Manager">
                <figcaption>Peter Ezeigwe – Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Guide">
                <figcaption>Kelvin Johnson – Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Support">
                <figcaption>Alexa Bliss– Customer Support</figcaption>
            </figure>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <!-- Name -->
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <!-- Email -->
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <!-- Radio Buttons -->
                <fieldset>
                    <legend>Purpose of Message:</legend>

                    <input type="radio" id="general" name="purpose" value="general" required>
                    <label for="general">General Inquiry</label>

                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>

                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </fieldset>

                <!-- Message -->
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <!-- Checkbox -->
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label>

                <!-- Submit Button -->
                <button type="submit">Send Message</button>

            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 💦 Rafting Travel 💦 CELESTIAL KING</p>

        <div class="social-icons">
            <img src="images/facebook.png" alt="Facebook">
            <img src="images/twitter.png" alt="Twitter">
            <img src="images/instagram.png" alt="Instagram">
        </div>
    </footer>

</body>

</html>
